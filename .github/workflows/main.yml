name: Build Electron App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files to find package.json
        run: dir /s package.json
        shell: cmd

      - name: Install dependencies
        run: |
          # العثور على المجلد الذي يحتوي على package.json
          for /f "delims=" %%i in ('dir /s /b package.json') do set "pkg_dir=%%~dpi"
          cd "%pkg_dir%"
          npm install

      - name: Build
        run: |
          for /f "delims=" %%i in ('dir /s /b package.json') do set "pkg_dir=%%~dpi"
          cd "%pkg_dir%"
          npm run electron:build
