name: Build Electron App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find and build
        shell: cmd
        run: |
          echo "Searching for package.json..."
          dir /s /b package.json
          for /f "delims=" %%i in ('dir /s /b package.json') do (
            echo "Found at: %%~dpi"
            cd "%%~dpi"
            call npm install
            call npm run electron:build
          )
